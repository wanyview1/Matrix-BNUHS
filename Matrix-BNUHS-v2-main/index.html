
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附中矩阵 | BNU-MATRIX NEO-HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f43f5e;
            --secondary-color: #e11d48;
            --accent-color: #0ea5e9;
            --terminal-bg: #fdfeff;
            --hud-glass: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--terminal-bg);
            color: #1e293b;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        .font-mono { font-family: 'Fira Code', monospace; }

        /* Advanced Lab Grid */
        .cyber-grid {
            background-image: 
                radial-gradient(circle at 1px 1px, rgba(244, 63, 94, 0.05) 1px, transparent 0),
                linear-gradient(rgba(244, 63, 94, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 63, 94, 0.03) 1px, transparent 1px);
            background-size: 20px 20px, 100px 100px, 100px 100px;
        }

        /* Sophisticated Scanline */
        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(14, 165, 233, 0.05) 50%, transparent 100%);
            background-size: 100% 400px;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* HUD Panel Glassmorphism */
        .hud-panel {
            position: relative;
            background: var(--hud-glass);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(244, 63, 94, 0.1);
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hud-panel:hover {
            border-color: rgba(244, 63, 94, 0.3);
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        /* Tech Brackets - Red */
        .hud-panel::before, .hud-panel::after {
            content: "";
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--primary-color);
            border-style: solid;
            pointer-events: none;
            opacity: 0.6;
        }
        .hud-panel::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .hud-panel::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        /* Vertical Text Rotation */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-soft-pulse { animation: pulse-soft 2s infinite; }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            animation: shimmer 2s linear infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        .text-glow {
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.3);
        }
    </style>
